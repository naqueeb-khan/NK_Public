databaseChangeLog:
  - changeSet:
      id: 002-create-user-table
      author: naqueeb.khan
      changes:
        - createTable:
            tableName: user
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(150)
                  constraints:
                    nullable: true
              - column:
                  name: last_name
                  type: VARCHAR(150)
                  constraints:
                    nullable: true
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: false
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: user
            baseColumnNames: role_id
            constraintName: fk_user_role
            referencedTableName: role
            referencedColumnNames: id
            onDelete: RESTRICT
            onUpdate: CASCADE

      rollback:
        - dropTable:
            tableName: user