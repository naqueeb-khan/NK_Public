databaseChangeLog:
  - changeSet:
      id: 004-user-table-drop-col-phone
      author: naqueeb.khan
      changes:
        - dropColumn:
            tableName: user
            columnName: phone

      rollback:
        - addColumn:
            tableName: user
            columns:
              - column:
                  name: phone
                  type: VARCHAR(20)
                  constraints:
                    nullable: true