spring.application.name=rts
server.port=8080

#Liquibase --disable liquibase on app start up run it separately using 
spring.liquibase.enabled=false


# DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/testdb
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# replace update to none as Liquibase will manage db schema
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect -- spring boot 3.x will auto detect Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# Log file name and path
logging.file.name=logs/rts.log
logging.level.root=INFO
logging.level.com.rts=DEBUG
logging.file.max-size=10MB
logging.file.max-history=5

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.tool.hbm2ddl=DEBUG

#Keyclock auth server
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8181/realms/rts-realme
logging.level.org.springframework.security: DEBUG
logging.level.org.springframework.security.oauth2: DEBUG

#Redis Cache
spring.data.redis.host=localhost
spring.data.redis.port=6379